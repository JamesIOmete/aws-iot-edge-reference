name: Terraform Plan + AI Review

on:
  pull_request:
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # needed to post plan output as a PR comment

jobs:
  terraform-plan:
    name: Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false   # required for plan -json to produce clean output

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (text + JSON)
        id: plan
        run: |
          # Text output — for the PR comment readability
          terraform plan \
            -input=false \
            -no-color \
            -var="alert_email=" \
            2>&1 | tee ../plan_output.txt

          # JSON output — for the AI reviewer
          terraform plan \
            -input=false \
            -no-color \
            -json \
            -var="alert_email=" \
            2>/dev/null > ../plan.json

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            plan_output.txt
            plan.json
          retention-days: 7

      # AI plan review via tf-plan-ai-reviewer.
      # Uses Anthropic Claude by default; falls back to OpenAI if
      # ANTHROPIC_API_KEY is not set. Non-fatal — plan review is advisory.
      - name: AI plan review
        if: github.event_name == 'pull_request'
        uses: JamesIOmete/tf-plan-ai-reviewer@master
        with:
          plan-json-path: plan.json
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          anthropic-model: claude-sonnet-4-20250514
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
